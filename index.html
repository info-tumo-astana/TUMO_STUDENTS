<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Поиск ученика</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<script src="script.js"></script>
<div class="page">
<div class="container">
  <img src="logo tumo.png" alt="Логотип" class="logo">
  <h1>Поиск учащегося</h1>
  <div class="form">
    <label for="name">Введите ФИО учащегося (согласно документу)</label>
    <input type="text" id="name">
    <label for="birth">Введите дату рождения учащегося</label>
    <input type="date" id="birth" placeholder="Дата рождения">
    <button id="searchBtn">Найти</button>
  </div>

  <div id="result" class="result"></div>
</div>
<div class="map-container">
  <p style="font-weight: bold; text-align: center; color: #fff; font-size: 16px;">Центр TUMO Astana находится на 2–3 этажах <br>Международного центра искусственного интеллекта <a href="https://alem.ai/ru/">alem.ai</a>.</p>
  <iframe 
  src="https://yandex.ru/map-widget/v1/?ll=71.416047,51.089200&z=16&pt=71.416047,51.089200,pm2rdm"
  width="100%" 
  height="300" 
  frameborder="0">
</iframe>
</div>
</div>

</body>
</html>
